<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Page</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
 
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand">MyCollege</span>
  </nav>
 
  <div class="container mt-4">
 
    <!-- Alert -->
    <div class="alert alert-success">Welcome to Page made with Bootstrap!</div>
 
    <!-- Grid: 3 Cards -->
    <div class="row">
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Card 1</h5>
          <p>Column 1 content here.</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Card 2</h5>
          <p>Column 2 content here.</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3">
          <h5>Card 3</h5>
          <p>Column 3 content here.</p>
        </div>
      </div>
    </div>
 
    <!-- Button -->
    <button class="btn btn-primary mt-3">Click Me</button>
 
  </div>
 
</body>
</html>
