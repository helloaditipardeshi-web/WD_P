<!DOCTYPE html>
<html>
<head>
  <title>Image, Link, Table</title>
</head>
<body>
 
  <h2>Web Page with Image, Hyperlink and Nested Table</h2>
 
  <!-- Image -->
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMT69g2n4VLBb19nLjBb6G4IXWCgWqBuM1Cg&s" alt="College" width="200" height="150">
 
  <!-- Hyperlink -->
  <p><a href="https://www.google.com" target="_blank">Visit Google</a></p>
 
  <!-- Outer Table -->
  <table border="1" cellpadding="5">
    <tr>
      <th>Student</th>
      <th>Marks</th>
    </tr>
    <tr>
      <td>Alice</td>
      <td>
        <!-- Nested Table -->
        <table border="1" cellpadding="3">
          <tr><th>Sub</th><th>Marks</th></tr>
          <tr><td>Maths</td><td>90</td></tr>
          <tr><td>Science</td><td>85</td></tr>
        </table>
      </td>
    </tr>
  </table>
 
</body>
</html>
